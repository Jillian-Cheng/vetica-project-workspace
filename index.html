<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vetica TAIPEI 瑞致品牌 — Project Workspace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: #e0e0dc;
    --border-light: #ebebea;
    --text: #222222;
    --text-mid: #555555;
    --text-muted: #888888;
    --accent: #333333;
    --tag-high: #c0392b;
    --tag-mid: #e67e22;
    --tag-low: #27ae60;
    --status-active: #2980b9;
    --status-done: #27ae60;
    --status-pause: #8e44ad;
    --status-cancel: #7f8c8d;
    --cal-todo: #2980b9;
    --cal-invoice: #e67e22;
    --cal-est: #8e44ad;
    --cal-actual: #27ae60;
    --radius: 8px;
    --radius-sm: 5px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 2px 12px rgba(0,0,0,0.10);
    --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang TC', sans-serif;
    --font-mono: 'SF Mono', 'Courier New', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── Login Screen ─── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 3rem;
    width: 100%;
    max-width: 380px;
    box-shadow: var(--shadow-md);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 2rem;
  }

  .login-logo .brand-mark {
    display: inline-block;
    background: #111;
    color: #fff;
    padding: 6px 16px 8px;
    font-size: 15px;
    letter-spacing: 0.12em;
    font-weight: 600;
    border-radius: 4px;
  }

  .login-logo .brand-sub {
    display: block;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    margin-top: 10px;
    text-transform: uppercase;
  }

  .login-card h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: #999;
    background: #fff;
  }

  .btn-primary {
    width: 100%;
    padding: 10px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s;
    margin-top: 8px;
  }

  .btn-primary:hover { background: #444; }

  /* ─── App Shell ─── */
  #app { display: none; }

  /* ─── Header ─── */
  .header {
    background: #111;
    color: #fff;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo .brand-mark {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #fff;
  }

  .header-logo .brand-sep {
    width: 1px;
    height: 18px;
    background: #444;
  }

  .header-logo .workspace-label {
    font-size: 12px;
    color: #aaa;
    letter-spacing: 0.04em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 12px;
    color: #aaa;
  }

  .btn-logout {
    background: none;
    border: 1px solid #444;
    color: #aaa;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .btn-logout:hover { border-color: #888; color: #ddd; }

  /* ─── Tab Nav ─── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    gap: 0;
  }

  .tab-nav button {
    background: none;
    border: none;
    padding: 14px 20px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    letter-spacing: 0.03em;
    transition: color 0.15s;
  }

  .tab-nav button:hover { color: var(--text); }

  .tab-nav button.active {
    color: var(--text);
    font-weight: 600;
    border-bottom-color: #222;
  }

  /* ─── Content Area ─── */
  .content { padding: 2rem; max-width: 1100px; margin: 0 auto; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── Section Header ─── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .btn:hover { background: var(--bg); border-color: #bbb; }

  .btn-dark {
    background: #222;
    color: #fff;
    border-color: #222;
  }

  .btn-dark:hover { background: #444; border-color: #444; }

  .btn-sm {
    padding: 4px 10px;
    font-size: 12px;
  }

  .btn-icon {
    padding: 5px 8px;
    font-size: 13px;
  }

  /* ─── Filter Bar ─── */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .filter-btn:hover { background: var(--bg); }
  .filter-btn.active { background: #222; color: #fff; border-color: #222; }

  /* ─── Todo List ─── */
  .todo-list { display: flex; flex-direction: column; gap: 0; }

  .todo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: grab;
    transition: background 0.1s;
  }

  .todo-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
  .todo-item:last-child { border-bottom: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); }
  .todo-item:only-child { border-radius: var(--radius); border-bottom: 1px solid var(--border); }
  .todo-item:hover { background: #fafafa; }
  .todo-item.dragging { opacity: 0.4; }
  .todo-item.drag-over { border-top: 2px solid #555; }

  .todo-check {
    width: 18px;
    height: 18px;
    min-width: 18px;
    margin-top: 2px;
    cursor: pointer;
    accent-color: #333;
  }

  .todo-body { flex: 1; min-width: 0; }

  .todo-text {
    font-size: 14px;
    color: var(--text);
    word-break: break-word;
  }

  .todo-text.done-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .todo-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 5px;
    align-items: center;
  }

  .todo-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    font-style: italic;
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .tag-high { background: #fdecea; color: var(--tag-high); }
  .tag-mid { background: #fef3e2; color: var(--tag-mid); }
  .tag-low { background: #e8f8f0; color: var(--tag-low); }
  .tag-member { background: #eef2ff; color: #3949ab; }
  .tag-date { background: var(--bg); color: var(--text-muted); }

  .todo-actions {
    display: flex;
    gap: 4px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .todo-item:hover .todo-actions { opacity: 1; }

  /* ─── Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: var(--shadow-md);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 1.5rem;
    letter-spacing: 0.02em;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.5rem;
  }

  /* ─── Calendar ─── */
  .calendar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .cal-nav-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day-header {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 4px 0 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .cal-cell {
    min-height: 72px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 4px;
    background: var(--surface);
    vertical-align: top;
    cursor: default;
  }

  .cal-cell.other-month { background: var(--bg); }

  .cal-cell.today .cal-date {
    background: #222;
    color: #fff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cal-date {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cal-dot {
    font-size: 10px;
    border-radius: 3px;
    padding: 1px 5px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    display: block;
  }

  .cal-dot-todo { background: #dbeafe; color: #1d4ed8; }
  .cal-dot-invoice { background: #fef3c7; color: #d97706; }
  .cal-dot-payment-est { background: #ede9fe; color: #7c3aed; }
  .cal-dot-payment-actual { background: #d1fae5; color: #065f46; }

  .cal-legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .cal-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-mid);
  }

  .cal-legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }

  /* ─── Projects ─── */
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .project-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .project-header:hover { background: #fafafa; }

  .project-expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    padding: 2px;
    line-height: 1;
  }

  .project-name {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
    letter-spacing: 0.02em;
  }

  .project-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .status-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .status-提案中 { background: #e3f2fd; color: #1565c0; }
  .status-進行中 { background: #e8f5e9; color: #2e7d32; }
  .status-已完成 { background: #f3e5f5; color: #6a1b9a; }
  .status-暫停 { background: #fff3e0; color: #e65100; }
  .status-取消 { background: #fafafa; color: #757575; }

  .project-body {
    border-top: 1px solid var(--border-light);
    display: none;
  }

  .project-body.open { display: block; }

  .project-details {
    padding: 16px 18px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    background: #fafafa;
    border-bottom: 1px solid var(--border-light);
  }

  .project-detail-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .project-detail-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .project-detail-value {
    font-size: 13px;
    color: var(--text);
  }

  /* ─── Subtasks ─── */
  .subtasks-section { padding: 16px 18px; }

  .subtasks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .subtasks-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .subtask-l1 { margin-bottom: 8px; }

  .subtask-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    background: var(--bg);
    margin-bottom: 4px;
  }

  .subtask-row:hover { background: #eee; }

  .subtask-l2 { margin-left: 20px; }

  .subtask-l3 { margin-left: 40px; }

  .subtask-row.l1 { border-left: 3px solid #555; }
  .subtask-row.l2 { border-left: 3px solid #aaa; background: #f8f8f7; }
  .subtask-row.l3 { border-left: 3px solid #ddd; background: #f3f3f2; }

  .subtask-text {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }

  .subtask-progress {
    font-size: 11px;
    color: var(--text-muted);
    min-width: 28px;
    text-align: right;
    font-family: var(--font-mono);
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }

  .progress-bar-fill {
    height: 100%;
    background: #555;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ─── Notes ─── */
  .notes-section {
    padding: 16px 18px;
    border-top: 1px solid var(--border-light);
  }

  .notes-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .note-item {
    background: #fffdf0;
    border: 1px solid #f0e68c;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 8px;
    position: relative;
  }

  .note-content {
    font-size: 13px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.65;
  }

  .note-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .note-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .note-item:hover .note-actions { opacity: 1; }

  .add-note-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    margin-top: 10px;
  }

  .add-note-row textarea {
    flex: 1;
    resize: none;
    min-height: 36px;
    max-height: 120px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
    outline: none;
  }

  .add-note-row textarea:focus { border-color: #999; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: #222;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow-md);
    transform: translateY(0);
    opacity: 1;
    transition: all 0.3s;
    z-index: 500;
  }

  .toast.hidden { opacity: 0; transform: translateY(12px); pointer-events: none; }

  /* ─── Misc ─── */
  .empty-state {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 12px; display: block; }

  hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  .text-muted { color: var(--text-muted); font-size: 12px; }

  select option { font-family: var(--font); }

  /* ─── Workspace Switcher ─── */
  .ws-switcher {
    position: relative;
    display: none;
  }

  .ws-switcher.visible { display: block; }

  .ws-switcher-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #222;
    border: 1px solid #444;
    color: #ddd;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .ws-switcher-btn:hover { border-color: #888; color: #fff; }

  .ws-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 8px;
    min-width: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 300;
    overflow: hidden;
  }

  .ws-dropdown.open { display: block; }

  .ws-dropdown-header {
    padding: 10px 14px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #666;
  }

  .ws-dropdown-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .ws-dropdown-item:hover { background: #2a2a2a; }
  .ws-dropdown-item.current { background: #2d2d2d; }

  .ws-dropdown-item-name {
    font-size: 13px;
    color: #ddd;
  }

  .ws-dropdown-item-desc {
    font-size: 11px;
    color: #666;
    margin-top: 1px;
  }

  .ws-dropdown-item-active {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    flex-shrink: 0;
  }

  .ws-dropdown-divider {
    border: none;
    border-top: 1px solid #333;
    margin: 4px 0;
  }

  .ws-dropdown-action {
    display: flex;
    align-items: center;

<div class="toast hidden" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURATION — 請填入您的 Supabase 資訊
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://ihewmltnvgcydoalpzyj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloZXdtbHRudmdjeWRvYWxwenlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDAzMzUsImV4cCI6MjA5NzMxNjMzNX0.LXwAA3mjLMBt4R7ROvaTXRBRHl_H3TeY7eFywKZQCts';
const ADMIN_PASSWORD = 'vetica-admin-2026'; // 管理者密碼，可自行修改

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let WS = '', USER = '', currentFilter = 'all', isAdmin = false;
let todos = [], projects = [], notes = [];
let calYear, calMonth;

// Restore session
(function () {
  const saved = localStorage.getItem('vt-session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.ws && s.user) { WS = s.ws; USER = s.user; bootApp(); }
    } catch (e) {}
  }
})();

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
async function doLogin() {
  const ws = document.getElementById('ws-input').value.trim();
  const pw = document.getElementById('ws-password').value;
  const name = document.getElementById('name-input').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!ws || !name || !pw) {
    errEl.textContent = '請填寫所有欄位';
    errEl.style.display = 'block';
    return;
  }

  // Verify workspace password
  const { data, error } = await sb.from('workspaces').select('name,password').eq('name', ws).single();
  if (error || !data) {
    errEl.textContent = '找不到此工作區，請確認名稱或聯絡管理者';
    errEl.style.display = 'block';
    return;
  }
  if (data.password !== pw) {
    errEl.textContent = '密碼錯誤';
    errEl.style.display = 'block';
    return;
  }

  WS = ws; USER = name;
  localStorage.setItem('vt-session', JSON.stringify({ ws: WS, user: USER }));
  bootApp();
}

function doLogout() {
  localStorage.removeItem('vt-session');
  WS = ''; USER = ''; isAdmin = false;
  document.getElementById('ws-switcher').classList.remove('visible');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function bootApp() {
  isAdmin = (WS === 'admin');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-label').textContent = USER;

  if (isAdmin) {
    // 管理者：顯示切換器，預設進入第一個非 admin 工作區
    document.getElementById('ws-switcher').classList.add('visible');
    loadWorkspaceSwitcher().then(() => {
      // 若 WS 仍是 admin，切換到第一個可用工作區
      if (WS === 'admin') {
        const first = document.querySelector('.ws-dropdown-item');
        if (first) {
          const name = first.dataset.name;
          if (name) switchToWorkspace(name);
          return;
        }
      }
      updateWsLabel();
      loadAllAndRender();
    });
  } else {
    document.getElementById('ws-switcher').classList.remove('visible');
    updateWsLabel();
    loadAllAndRender();
  }

  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
}

function updateWsLabel() {
  document.getElementById('ws-label').textContent = WS;
  document.getElementById('ws-current-name').textContent = WS;
}

async function loadAllAndRender() {
  await loadAll();
}

// ═══════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════
async function loadAll() {
  await Promise.all([loadTodos(), loadProjects(), loadNotes()]);
  renderTodos();
  renderCalendar();
  renderProjects();
}

async function loadTodos() {
  const { data } = await sb.from('todos').select('*').eq('workspace', WS).order('sort_order');
  todos = data || [];
}

async function loadProjects() {
  const { data } = await sb.from('projects').select('*').eq('workspace', WS).order('created_at');
  projects = data || [];
}

async function loadNotes() {
  const { data } = await sb.from('notes').select('*').eq('workspace', WS).order('created_at');
  notes = data || [];
}

// ═══════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'calendar') renderCalendar();
}

// ═══════════════════════════════════════════════
//  TODOS
// ═══════════════════════════════════════════════
function setFilter(btn, f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}

function renderTodos() {
  const list = document.getElementById('todo-list');
  let filtered = todos.filter(t => {
    if (currentFilter === 'active') return !t.done;
    if (currentFilter === 'done') return t.done;
    if (currentFilter === 'high') return t.priority === 'high';
    if (currentFilter === 'mid') return t.priority === 'mid';
    if (currentFilter === 'low') return t.priority === 'low';
    return true;
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><span class="icon">✓</span>暫無任務</div>';
    return;
  }

  const priLabel = { high: '高', mid: '中', low: '低' };
  const priClass = { high: 'tag-high', mid: 'tag-mid', low: 'tag-low' };

  list.innerHTML = filtered.map(t => `
    <div class="todo-item" draggable="true"
      data-id="${t.id}"
      ondragstart="dragStart(event)"
      ondragover="dragOver(event)"
      ondrop="dropTodo(event)"
      ondragleave="dragLeave(event)">
      <input type="checkbox" class="todo-check" ${t.done ? 'checked' : ''}
        onchange="toggleTodo('${t.id}', this.checked)" />
      <div class="todo-body">
        <div class="todo-text ${t.done ? 'done-text' : ''}">${esc(t.text)}</div>
        <div class="todo-meta">
          ${t.priority ? `<span class="tag ${priClass[t.priority]}">${priLabel[t.priority]}</span>` : ''}
          ${t.member ? `<span class="tag tag-member">${esc(t.member)}</span>` : ''}
          ${t.date ? `<span class="tag tag-date">📅 ${t.date}</span>` : ''}
        </div>
        ${t.note ? `<div class="todo-note">${esc(t.note)}</div>` : ''}
      </div>
      <div class="todo-actions">
        <button class="btn btn-sm btn-icon" onclick="editTodo('${t.id}')">✎</button>
        <button class="btn btn-sm btn-icon" onclick="deleteTodo('${t.id}')" style="color:#c0392b">✕</button>
      </div>
    </div>
  `).join('');
}

// ── Modal ──
function openTodoModal(id) {
  document.getElementById('todo-modal-title').textContent = id ? '編輯待辦' : '新增待辦';
  document.getElementById('todo-edit-id').value = id || '';
  const t = id ? todos.find(x => x.id === id) : null;
  document.getElementById('todo-text').value = t ? t.text : '';
  document.getElementById('todo-priority').value = t ? (t.priority || '') : '';
  document.getElementById('todo-member').value = t ? (t.member || '') : '';
  document.getElementById('todo-date').value = t ? (t.date || '') : '';
  document.getElementById('todo-note').value = t ? (t.note || '') : '';
  document.getElementById('todo-modal').classList.add('open');
  setTimeout(() => document.getElementById('todo-text').focus(), 80);
}

function closeTodoModal() {
  document.getElementById('todo-modal').classList.remove('open');
}

async function saveTodo() {
  const text = document.getElementById('todo-text').value.trim();
  if (!text) { showToast('請輸入任務名稱'); return; }
  const id = document.getElementById('todo-edit-id').value;
  const payload = {
    text,
    priority: document.getElementById('todo-priority').value || null,
    member: document.getElementById('todo-member').value.trim() || null,
    date: document.getElementById('todo-date').value || null,
    note: document.getElementById('todo-note').value.trim() || null,
  };

  if (id) {
    await sb.from('todos').update(payload).eq('id', id);
    showToast('已更新');
  } else {
    const newId = 'td-' + Date.now();
    const maxOrder = todos.length ? Math.max(...todos.map(t => t.sort_order || 0)) : 0;
    await sb.from('todos').insert({
      id: newId, workspace: WS, created_by: USER,
      sort_order: maxOrder + 1, done: false, ...payload
    });
    showToast('已新增');
  }

  closeTodoModal();
  await loadTodos();
  renderTodos();
  renderCalendar();
}

function editTodo(id) { openTodoModal(id); }

async function deleteTodo(id) {
  if (!confirm('確定刪除此待辦？')) return;
  await sb.from('todos').delete().eq('id', id);
  await loadTodos();
  renderTodos();
  renderCalendar();
  showToast('已刪除');
}

async function toggleTodo(id, done) {
  await sb.from('todos').update({ done }).eq('id', id);
  const t = todos.find(x => x.id === id);
  if (t) t.done = done;
  renderTodos();
}

async function tidyTodos() {
  const active = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);
  const reordered = [...active, ...done];
  for (let i = 0; i < reordered.length; i++) {
    await sb.from('todos').update({ sort_order: i }).eq('id', reordered[i].id);
  }

// ── Drag & Drop ──
let dragId = null;

function dragStart(e) {
  dragId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
}

function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function dropTodo(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.id;
  e.currentTarget.classList.remove('drag-over');
  document.querySelectorAll('.todo-item').forEach(el => {
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });
  if (!dragId || dragId === targetId) return;
  const from = todos.findIndex(t => t.id === dragId);
  const to = todos.findIndex(t => t.id === targetId);
  todos.splice(to, 0, todos.splice(from, 1)[0]);
  for (let i = 0; i < todos.length; i++) {
    await sb.from('todos').update({ sort_order: i }).eq('id', todos[i].id);
  }
  renderTodos();
  dragId = null;
}

// ═══════════════════════════════════════════════
function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

function renderCalendar() {
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('cal-title').textContent = `${calYear} · ${monthNames[calMonth]}`;

  const grid = document.getElementById('cal-grid');
  const days = ['日','一','二','三','四','五','六'];
  let html = days.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;

  // Build events map
  const evMap = {};
  const addEv = (dateStr, type, label) => {
    if (!dateStr) return;
    if (!evMap[dateStr]) evMap[dateStr] = [];
    evMap[dateStr].push({ type, label });
  };

  todos.forEach(t => { if (t.date) addEv(t.date, 'todo', t.text); });
  projects.forEach(p => {
    if (p.invoice_date) addEv(p.invoice_date, 'invoice', p.name + ' 發票');
    if (p.payment_estimated) addEv(p.payment_estimated, 'pay-est', p.name + ' 預估收款');
    if (p.payment_actual) addEv(p.payment_actual, 'pay-actual', p.name + ' 實際收款');
  });

  const typeClass = { todo: 'cal-dot-todo', invoice: 'cal-dot-invoice', 'pay-est': 'cal-dot-payment-est', 'pay-actual': 'cal-dot-payment-actual' };

  let d = 1;
  for (let row = 0; row < 6; row++) {
    for (let col = 0; col < 7; col++) {
      const cellIdx = row * 7 + col;
      if (cellIdx < firstDay || d > lastDate) {
        html += '<div class="cal-cell other-month"></div>';
      } else {
        const dateStr = `${calYear}-${pad2(calMonth+1)}-${pad2(d)}`;
        const isToday = dateStr === todayStr;
        const evs = evMap[dateStr] || [];
        html += `<div class="cal-cell ${isToday ? 'today' : ''}">
          <div class="cal-date">${d}</div>
          ${evs.slice(0, 3).map(e => `<span class="cal-dot ${typeClass[e.type]}" title="${esc(e.label)}">${esc(e.label.slice(0,12))}</span>`).join('')}
          ${evs.length > 3 ? `<span class="cal-dot" style="color:#aaa">+${evs.length-3}</span>` : ''}
        </div>`;
        d++;
      }
    }
    if (d > lastDate) break;
  }

  grid.innerHTML = html;
}

// ─── Subtasks ───
function renderSubtasks(p) {
  const subs = p.subs || [];
  if (!subs.length) return '<div style="color:var(--text-muted);font-size:12px;padding:4px 0">尚無子任務</div>';
  return subs.map((s, i) => renderSubRow(p.id, s, [i], 'l1')).join('');
}

function renderSubRow(pid, sub, path, level) {
  const pathStr = JSON.stringify(path);
  const pct = sub.pct || 0;
  let html = `
    <div class="subtask-row ${level}">
      <span class="subtask-text">${esc(sub.text)}</span>
      <span class="subtask-progress">${pct}%</span>
      <div style="display:flex;gap:4px">
        <button class="btn btn-sm btn-icon" title="編輯" onclick="openSubModal('${pid}','${pathStr}')">✎</button>`;
  if (level !== 'l3') {
    html += `<button class="btn btn-sm btn-icon" title="新增子項目" onclick="openSubModal('${pid}',null,'${pathStr}')">＋</button>`;
  }
  html += `<button class="btn btn-sm btn-icon" title="加入待辦" onclick="subToTodo('${pid}','${pathStr}')">↓</button>
        <button class="btn btn-sm btn-icon" style="color:#c0392b" onclick="deleteSub('${pid}','${pathStr}')">✕</button>
      </div>
    </div>`;

  const barHtml = `<div style="margin-left:${level==='l1'?4:level==='l2'?24:44}px;margin-bottom:4px">
    <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
  </div>`;
  html = barHtml + html;

  if (sub.children && level !== 'l3') {
    const nextLevel = level === 'l1' ? 'l2' : 'l3';
    html += `<div style="margin-left:${level==='l1'?20:40}px">`;
    html += (sub.children || []).map((c, ci) => renderSubRow(pid, c, [...path, ci], nextLevel)).join('');
    html += '</div>';
  }

  return html;
}

// Sub Modal
let subParentPath = null; // null = top-level

function openSubModal(projId, editPath, parentPath) {
  document.getElementById('sub-modal-title').textContent = editPath ? '編輯子任務' : '新增子任務';
  document.getElementById('sub-proj-id').value = projId;
  document.getElementById('sub-edit-path').value = editPath || '';
  subParentPath = parentPath ? JSON.parse(parentPath) : null;

  let text = '', pct = 0;
  if (editPath) {
    const sub = getSubByPath(projId, JSON.parse(editPath));
    if (sub) { text = sub.text; pct = sub.pct || 0; }
  }
  document.getElementById('sub-text').value = text;
  document.getElementById('sub-pct').value = pct;
  document.getElementById('sub-modal').classList.add('open');
  setTimeout(() => document.getElementById('sub-text').focus(), 80);
}

function closeSubModal() { document.getElementById('sub-modal').classList.remove('open'); }

function getSubByPath(projId, path) {
  const p = projects.find(x => x.id === projId);
  if (!p) return null;
  let node = p.subs[path[0]];
  for (let i = 1; i < path.length; i++) node = node.children[path[i]];
  return node;
}

async function saveSub() {
  const text = document.getElementById('sub-text').value.trim();
  if (!text) { showToast('請輸入子任務名稱'); return; }
  const pct = parseInt(document.getElementById('sub-pct').value) || 0;
  const projId = document.getElementById('sub-proj-id').value;
  const editPath = document.getElementById('sub-edit-path').value;
  const p = projects.find(x => x.id === projId);
  if (!p) return;

  const subs = JSON.parse(JSON.stringify(p.subs || []));

  if (editPath) {
    // Edit existing
    const path = JSON.parse(editPath);
    let node = subs[path[0]];
    for (let i = 1; i < path.length; i++) node = node.children[path[i]];
    node.text = text; node.pct = pct;
  } else if (subParentPath) {
    // Add as child
    let node = subs[subParentPath[0]];
    for (let i = 1; i < subParentPath.length; i++) node = node.children[subParentPath[i]];
    if (!node.children) node.children = [];
    node.children.push({ text, pct, children: [] });
  } else {
    // Add top-level
    subs.push({ text, pct, children: [] });
  }

  await sb.from('projects').update({ subs }).eq('id', projId);
  closeSubModal();
  await loadProjects();
  renderProjects();
  // Re-open the project accordion
  setTimeout(() => {
    const body = document.getElementById('pb-' + projId);
    const btn = document.getElementById('exp-' + projId);
    if (body && !body.classList.contains('open')) {
      body.classList.add('open');
      if (btn) btn.textContent = '▼';
    }
  }, 50);
  showToast('子任務已儲存');
}

async function deleteSub(projId, pathStr) {
  if (!confirm('確定刪除？')) return;
  const p = projects.find(x => x.id === projId);
  if (!p) return;
  const subs = JSON.parse(JSON.stringify(p.subs || []));
  const path = JSON.parse(pathStr);

  if (path.length === 1) {
    subs.splice(path[0], 1);
  } else if (path.length === 2) {
    subs[path[0]].children.splice(path[1], 1);
  } else {
    subs[path[0]].children[path[1]].children.splice(path[2], 1);
  }

  await sb.from('projects').update({ subs }).eq('id', projId);
  await loadProjects();
  renderProjects();
  setTimeout(() => {
    const body = document.getElementById('pb-' + projId);
    const btn = document.getElementById('exp-' + projId);
    if (body) { body.classList.add('open'); if (btn) btn.textContent = '▼'; }
  }, 50);
  showToast('已刪除');
}

async function subToTodo(projId, pathStr) {
  const sub = getSubByPath(projId, JSON.parse(pathStr));
  const proj = projects.find(x => x.id === projId);
  if (!sub || !proj) return;
  const newId = 'td-' + Date.now();
  const maxOrder = todos.length ? Math.max(...todos.map(t => t.sort_order || 0)) : 0;
  await sb.from('todos').insert({
    id: newId, workspace: WS, created_by: USER,
    text: `[${proj.name}] ${sub.text}`, done: false,
    sort_order: maxOrder + 1
  });
  await loadTodos();
  renderTodos();
  renderCalendar();
  showToast('已加入待辦事項');
}

  showToast(`工作區「${name}」已建立`);
}

async function deleteWorkspace(name) {
  if (!confirm(`確定刪除工作區「${name}」？\n此操作不會刪除工作區內的資料。`)) return;
  await sb.from('workspaces').delete().eq('name', name);
  if (WS === name) await switchToWorkspace(allWorkspaces[0]?.name || 'admin');
  await renderAdminWsList();
  showToast('工作區已刪除');
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pad2(n) { return String(n).padStart(2, '0'); }

function fmtDate(iso) {
  if (!iso) return '';
  return iso.slice(0, 10);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 2200);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) o.classList.remove('open');
  });
});

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    doLogin();
  }
});
</script>
